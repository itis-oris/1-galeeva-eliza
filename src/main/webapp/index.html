<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>workouts tracker</title>
    <link rel='stylesheet'
          href='https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&amp;display=swap'>
    <link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=Material+Icons+Round'>
    <link rel="stylesheet" href="css/style-sidenav.css">
    <style>
        body {
            background-image: url('images/basic_background.png');
            display: flex;
        }
    </style>
</head>
<body>

<nav id="navbar">
    <ul class="navbar-items flexbox-col">
        <li class="navbar-logo flexbox-left">
            <a class="navbar-item-inner flexbox">
                <img src="images/heart.png" id="Layer_1" data-name="Layer 1" viewBox="0 0 1438.88 1819.54"></img>
            </a>
        </li>

        <li class="navbar-item flexbox-left">
            <a class="navbar-item-inner flexbox-left" href="add_workout">
                <div class="navbar-item-inner-icon-wrapper flexbox">
                    <ion-icon name="barbell-outline"></ion-icon>
                </div>
                <span class="link-text">Add Workout</span>
            </a>
        </li>
        <li class="navbar-item flexbox-left">
            <a class="navbar-item-inner flexbox-left" href="progress">
                <div class="navbar-item-inner-icon-wrapper flexbox">
                    <ion-icon name="bar-chart-outline"></ion-icon>
                </div>
                <span class="link-text">Progress</span>
            </a>
        </li>
        <li class="navbar-item flexbox-left">
            <a class="navbar-item-inner flexbox-left" href="view_workouts">
                <div class="navbar-item-inner-icon-wrapper flexbox">
                    <ion-icon name="book-outline"></ion-icon>
                </div>
                <span class="link-text">Workouts</span>
            </a>
        </li>
        <li class="navbar-item flexbox-left">
            <a class="navbar-item-inner flexbox-left" href="settings">
                <div class="navbar-item-inner-icon-wrapper flexbox">
                    <ion-icon name="settings-outline"></ion-icon>
                </div>
                <span class="link-text">Settings</span>
            </a>
        </li>
    </ul>
</nav>

<!-- Main -->
<main id="main" class="flexbox-col">
    <h2>Hi!</h2>
    <p>Let's workout I guess?</p>
</main>
<!-- partial -->
<script src='https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js'></script>
<script src='https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js'></script>

</html>
